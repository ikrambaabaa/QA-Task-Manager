stages:
  - install
  - build
  - test

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  QA_API_URL:       "http://ton-backend:8000/api"
  QA_PROJECT_ID:    "1"
  # Chemin de sortie du rapport JSON Playwright (lu par _parse_json_report)
  PLAYWRIGHT_JSON_OUTPUT_NAME: "test-results/report.json"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

# ─────────────────────────────────────
# 1. INSTALL
# ─────────────────────────────────────
install_dependencies:
  stage: install
  image: node:20
  script:
    - npm ci

# ─────────────────────────────────────
# 2. BUILD
# ─────────────────────────────────────
build_app:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# ─────────────────────────────────────
# 3. TESTS PLAYWRIGHT
# ─────────────────────────────────────
playwright_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  allow_failure: true   # les échecs de tests n'arrêtent pas la pipeline
  script:
    - npm ci
    - npx playwright install --with-deps

    # Lance les tests — rapport list (console) + json (fichier)
    - npx playwright test --reporter=list,json

    # ── Reporter les résultats au QA AI Platform ──────────────────────────
    - |
      echo "Envoi des résultats au QA AI Platform..."
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST \
        "${QA_API_URL}/projects/${QA_PROJECT_ID}/executions/run" \
        -H "Content-Type: application/json")
      echo "API réponse : ${HTTP_STATUS}"
      if [ "$HTTP_STATUS" != "200" ]; then
        echo "⚠️  API non disponible (${HTTP_STATUS}) — résultats non remontés"
      else
        echo "✅ Résultats envoyés au QA AI Platform"
      fi

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week